<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Keeta Dispatch - Multimodal</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; height: 100vh; background-color: #f0f2f5; }
        #mapa { width: 70%; height: 100%; }
        #painel { width: 30%; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; overflow-y: auto; background: #fff; border-left: 1px solid #ddd;}
        
        h1 { font-size: 20px; color: #1a252f; margin-bottom: 2px; }
        .sub-header { color: #7f8c8d; font-size: 13px; margin-top: 0; margin-bottom: 15px; }
        
        #relogio-container { background: #1a252f; color: #00ffcc; padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 10px; font-weight: bold; font-size: 26px; font-family: 'Courier New', monospace; }
        .lbl-relogio { font-size: 10px; color: #bdc3c7; display: block; letter-spacing: 1px; margin-bottom: 2px;}

        #alerta-surge { display: none; background: #e74c3c; color: white; text-align: center; padding: 5px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 10px; animation: piscar 1.5s infinite; }
        @keyframes piscar { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .kpi-card { background: #f8f9fa; padding: 10px; border-radius: 6px; border-left: 4px solid #3498db; }
        .kpi-titulo { font-size: 9px; color: #7f8c8d; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        .kpi-valor { font-size: 16px; font-weight: bold; color: #2c3e50; margin-top: 5px; }
        
        .border-green { border-left-color: #27ae60; }
        .border-purple { border-left-color: #9b59b6; }
        .border-orange { border-left-color: #f39c12; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: auto; }
        button { color: white; border: none; padding: 12px; font-size: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-simular { background: #2980b9; }
        .btn-simular:hover { background: #2471a3; }
        .btn-exportar { background: #217346; } 
        .btn-exportar:hover { background: #1e6b3e; }
        
        #log { margin-top: 10px; margin-bottom: 15px; font-size: 11px; color: #444; background: #fdfdfd; border: 1px solid #e0e0e0; padding: 10px; border-radius: 4px; height: 160px; overflow-y: auto; line-height: 1.5; }
        .log-time { font-weight: bold; color: #95a5a6; }
        .log-sucesso { color: #27ae60; font-weight: bold;}
        .log-movimento { color: #2980b9; font-weight: 500;}
        .log-jit { color: #d35400; font-weight: bold; background: #fdf2e9; padding: 2px; } 
        .tag-bike { background: #2ecc71; color: white; padding: 1px 4px; border-radius: 3px; font-size: 9px; font-weight: bold; }
        .tag-moto { background: #34495e; color: white; padding: 1px 4px; border-radius: 3px; font-size: 9px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="mapa"></div>

    <div id="painel">
        <h1>Keeta Data Science Lab</h1>
        <p class="sub-header">Algoritmo Multimodal (Motos & Bikes)</p>

        <div id="relogio-container">
            <span class="lbl-relogio">HORÁRIO DO SERVIDOR</span>
            <span id="relogio-display">12:00</span>
        </div>
        
        <div id="alerta-surge">🔥 ALTA DEMANDA: TARIFA DINÂMICA (+ R$ 3,00)</div>

        <div class="kpi-grid">
            <div class="kpi-card border-orange">
                <div class="kpi-titulo">SLA Médio de Entrega</div>
                <div class="kpi-valor" id="kpi-sla">-- min</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-titulo">Corridas Finalizadas</div>
                <div class="kpi-valor" id="kpi-entregas">0</div>
            </div>
            <div class="kpi-card border-purple">
                <div class="kpi-titulo">Ganho Médio/Entregador</div>
                <div class="kpi-valor" id="kpi-ganho-entregador" style="color: #8e44ad;">R$ 0,00</div>
            </div>
            <div class="kpi-card border-green">
                <div class="kpi-titulo">Lucro Médio App/Entrega</div>
                <div class="kpi-valor" id="kpi-lucro-app" style="color: #27ae60;">R$ 0,00</div>
            </div>
        </div>

        <div id="log">Frota Híbrida inicializada...<br></div>

        <div class="btn-group">
            <button class="btn-simular" onclick="gerarNovoPedido()">+ Simular Novo Pedido</button>
            <button class="btn-exportar" onclick="baixarCSV()">📊 Exportar Dados (CSV Excel)</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Configurações Físicas
        const VEL_MOTO_KMH = 30; 
        const VEL_BIKE_KMH = 15; 
        
        let dataVirtual = new Date();
        dataVirtual.setHours(12, 0, 0, 0);

        const mapa = L.map('mapa').setView([-23.585, -46.678], 14); // Zoom um pouco mais próximo
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(mapa);

        // Ícones
        const iconeRest = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448657.png', iconSize: [30, 30] });
        const iconeCliente = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/2555/2555572.png', iconSize: [20, 20] });
        
        const iconeMotoLivre = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/1156/1156645.png', iconSize: [25, 25] });
        const iconeMotoOcupada = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/756/756940.png', iconSize: [30, 30] });
        
        const iconeBikeLivre = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/2972/2972185.png', iconSize: [22, 22] });
        const iconeBikeOcupada = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3063/3063822.png', iconSize: [28, 28] });

        const restaurantes = [
            { id: 'R1', lat: -23.586, lon: -46.679, nome: "Hamburgueria", tempoPreparoMin: 12 },
            { id: 'R2', lat: -23.582, lon: -46.682, nome: "Pizzaria", tempoPreparoMin: 22 }
        ];
        restaurantes.forEach(r => L.marker([r.lat, r.lon], {icon: iconeRest}).addTo(mapa).bindPopup(`${r.nome}`));

        // Frota Mista
        let frota = [
            { id: 1, tipo: 'MOTO', lat: -23.570, lon: -46.660, ocupado: false, marcador: L.marker([-23.570, -46.660], {icon: iconeMotoLivre}).addTo(mapa) },
            { id: 2, tipo: 'MOTO', lat: -23.600, lon: -46.690, ocupado: false, marcador: L.marker([-23.600, -46.690], {icon: iconeMotoLivre}).addTo(mapa) },
            { id: 3, tipo: 'BIKE', lat: -23.584, lon: -46.675, ocupado: false, marcador: L.marker([-23.584, -46.675], {icon: iconeBikeLivre}).addTo(mapa) }, // Bike perto dos restaurantes
            { id: 4, tipo: 'BIKE', lat: -23.588, lon: -46.680, ocupado: false, marcador: L.marker([-23.588, -46.680], {icon: iconeBikeLivre}).addTo(mapa) }, // Bike perto dos restaurantes
            { id: 5, tipo: 'MOTO', lat: -23.575, lon: -46.695, ocupado: false, marcador: L.marker([-23.575, -46.695], {icon: iconeMotoLivre}).addTo(mapa) }
        ];

        let filaDePedidos = [];
        let contadorPedidos = 1000;
        let metricas = { pedidosEntregues: 0, repasseTotalEntregadores: 0, lucroTotalApp: 0, tempoTotalSLA: 0 };
        let historicoDeDados = [];

        function calcularDistanciaKM(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function formatarHora(data) { return data.toLocaleTimeString('pt-BR', { hour: '2-digit', minute:'2-digit' }); }
        
        function registrarLog(mensagem) {
            const log = document.getElementById('log');
            log.innerHTML += `<span class="log-time">[${formatarHora(dataVirtual)}]</span> ${mensagem}<br>`;
            log.scrollTop = log.scrollHeight;
        }

        function rodarDispatch() {
            if (filaDePedidos.length === 0) return;

            let isSurgeAtivo = filaDePedidos.length >= 4;
            document.getElementById('alerta-surge').style.display = isSurgeAtivo ? 'block' : 'none';

            let lotes = [];
            let pendentes = [...filaDePedidos];
            
            while(pendentes.length > 0) {
                let pedidoBase = pendentes.shift();
                let loteAtual = [pedidoBase];

                for(let i = 0; i < pendentes.length; i++) {
                    let candidato = pendentes[i];
                    if (candidato.restaurante.id === pedidoBase.restaurante.id) {
                        let distEntreClientes = calcularDistanciaKM(pedidoBase.latCliente, pedidoBase.lonCliente, candidato.latCliente, candidato.lonCliente);
                        if (distEntreClientes <= 2.5) {
                            loteAtual.push(candidato);
                            pendentes.splice(i, 1);
                            break; 
                        }
                    }
                }
                lotes.push(loteAtual);
            }

            filaDePedidos = []; 

            for (let lote of lotes) {
                let entregadorDesignado = null;
                let menorTempoChegadaMin = Infinity;
                let restauranteDoLote = lote[0].restaurante;
                
                // Calcula distância máxima da entrega para filtrar as Bikes
                let distRestauranteCliente1 = calcularDistanciaKM(restauranteDoLote.lat, restauranteDoLote.lon, lote[0].latCliente, lote[0].lonCliente);
                let distTotalEstimada = distRestauranteCliente1;
                if(lote.length > 1) {
                     distTotalEstimada += calcularDistanciaKM(lote[0].latCliente, lote[0].lonCliente, lote[1].latCliente, lote[1].lonCliente);
                }

                for (let entregador of frota) {
                    if (!entregador.ocupado) {
                        let isBike = entregador.tipo === 'BIKE';
                        
                        // FILTRO GEOFENCING: Bike recusa rota acima de 3.0 km
                        if (isBike && distTotalEstimada > 3.0) continue; 

                        let distAteRestauranteKM = calcularDistanciaKM(entregador.lat, entregador.lon, restauranteDoLote.lat, restauranteDoLote.lon);
                        
                        // FÍSICA DO TRÂNSITO: Bikes ignoram trânsito pesado
                        let fatorTransito = isBike ? (0.8 + Math.random() * 0.3) : (0.5 + Math.random() * 0.6); 
                        let velBase = isBike ? VEL_BIKE_KMH : VEL_MOTO_KMH;
                        let velocidadeReal = velBase * fatorTransito;

                        let tempoMinutos = distAteRestauranteKM / (velocidadeReal / 60); 

                        if (tempoMinutos < menorTempoChegadaMin) {
                            menorTempoChegadaMin = tempoMinutos;
                            entregadorDesignado = entregador;
                        }
                    }
                }

                if (entregadorDesignado) {
                    alocarLote(entregadorDesignado, lote, menorTempoChegadaMin, isSurgeAtivo);
                } else {
                    lote.forEach(p => filaDePedidos.push(p));
                }
            }
        }

        function alocarLote(entregador, lote, tempoViagemAteRestauranteMin, isSurgeAtivo) {
            entregador.ocupado = true; 
            let restaurante = lote[0].restaurante;
            let isBatch = lote.length > 1;
            let isBike = entregador.tipo === 'BIKE';
            let tagTipo = isBike ? '<span class="tag-bike">BIKE</span>' : '<span class="tag-moto">MOTO</span>';

            let diferencaTempo = restaurante.tempoPreparoMin - tempoViagemAteRestauranteMin;
            let tempoPostergadoMin = 0;
            let tempoEsperaNoRestauranteMin = 2; 

            if (diferencaTempo > 3) {
                tempoPostergadoMin = diferencaTempo - 2; 
            } else if (diferencaTempo < 0) {
                tempoEsperaNoRestauranteMin = 0;
            }

            let tempoSLAEstimado = tempoPostergadoMin + tempoViagemAteRestauranteMin + tempoEsperaNoRestauranteMin;

            if (tempoPostergadoMin > 0) {
                registrarLog(`<span class="log-jit">🧠 JIT: ${tagTipo} ${entregador.id} alocado(a). Despacho aguardando ${Math.round(tempoPostergadoMin)} min.</span>`);
            } else {
                entregador.marcador.setIcon(isBike ? iconeBikeOcupada : iconeMotoOcupada);
            }

            setTimeout(() => {
                if (tempoPostergadoMin > 0) {
                    entregador.marcador.setIcon(isBike ? iconeBikeOcupada : iconeMotoOcupada); 
                }

                setTimeout(() => {
                    entregador.marcador.setLatLng([restaurante.lat, restaurante.lon]);
                    entregador.lat = restaurante.lat;
                    entregador.lon = restaurante.lon;
                    
                    setTimeout(() => {
                        let c1 = lote[0];
                        let distC1 = calcularDistanciaKM(restaurante.lat, restaurante.lon, c1.latCliente, c1.lonCliente);
                        
                        let fatorTransito = isBike ? 0.9 : 0.6; // Viagem
                        let velocidadeReal = (isBike ? VEL_BIKE_KMH : VEL_MOTO_KMH) * fatorTransito;
                        let tempoViagemC1 = distC1 / (velocidadeReal / 60) + 3; // +3 min portaria
                        
                        tempoSLAEstimado += tempoViagemC1;
                        
                        setTimeout(() => {
                            entregador.marcador.setLatLng([c1.latCliente, c1.lonCliente]);
                            entregador.lat = c1.latCliente;
                            entregador.lon = c1.lonCliente;
                            
                            mapa.removeLayer(c1.marcadorCliente);
                            metricas.tempoTotalSLA += tempoSLAEstimado;
                            
                            processarFinanceiro(entregador, c1, distC1, restaurante, isSurgeAtivo, !isBatch, tempoPostergadoMin, tempoEsperaNoRestauranteMin);

                            if (isBatch) {
                                let c2 = lote[1];
                                let distC2 = calcularDistanciaKM(c1.latCliente, c1.lonCliente, c2.latCliente, c2.lonCliente);
                                let tempoViagemC2 = distC2 / (velocidadeReal / 60) + 3;
                                tempoSLAEstimado += tempoViagemC2;
                                
                                setTimeout(() => {
                                    entregador.marcador.setLatLng([c2.latCliente, c2.lonCliente]);
                                    entregador.lat = c2.latCliente;
                                    entregador.lon = c2.lonCliente;
                                    
                                    mapa.removeLayer(c2.marcadorCliente);
                                    metricas.tempoTotalSLA += tempoSLAEstimado;
                                    processarFinanceiro(entregador, c2, distC1 + distC2, restaurante, isSurgeAtivo, true, tempoPostergadoMin, tempoEsperaNoRestauranteMin); 
                                    
                                }, tempoViagemC2 * 1000); 
                            }

                        }, tempoViagemC1 * 1000); 

                    }, tempoEsperaNoRestauranteMin * 1000); 

                }, tempoViagemAteRestauranteMin * 1000);

            }, tempoPostergadoMin * 1000); 
        }

        function processarFinanceiro(entregador, pedido, distPercorridaKM, restauranteBase, isSurgeAtivo, isFimDoTurno, minPostergados, minEsperaLoja) {
            
            let isBike = entregador.tipo === 'BIKE';
            
            // 1. Receita Sustentável (Igual para ambos)
            let taxaBaseCliente = 4.99 + (distPercorridaKM * 1.50); 
            let taxaAltaDemandaCliente = isSurgeAtivo ? 3.00 : 0.00; 
            let comissaoFixaRestaurante = 4.00; 
            let receitaTotalApp = taxaBaseCliente + taxaAltaDemandaCliente + comissaoFixaRestaurante;

            // 2. Pagamento Adaptado por Modal
            let ganhoBaseEntregador = 0;
            if(isBike) {
                // Bikes recebem base menor, mas valor por KM mais alto pelo esforço físico extremo
                ganhoBaseEntregador = 3.50 + (distPercorridaKM * 1.80); 
            } else {
                // Motos recebem base maior pelo custo do veículo, e km padrão
                ganhoBaseEntregador = 4.00 + (distPercorridaKM * 1.20); 
            }
            
            let bonusSurgeEntregador = isSurgeAtivo ? 2.50 : 0.00; 
            
            let taxaRetorno = 0;
            let distDeVoltaProPolo = calcularDistanciaKM(pedido.latCliente, pedido.lonCliente, restauranteBase.lat, restauranteBase.lon);
            if (distDeVoltaProPolo > 3.0 && !isBike) {
                // Geralmente Bikes não vão tão longe por causa da trava, mas se forem, ganham também
                taxaRetorno = 3.00; 
            }

            let ganhoTotalEntregador = ganhoBaseEntregador + bonusSurgeEntregador + taxaRetorno;
            let lucroLiquidoApp = receitaTotalApp - ganhoTotalEntregador;

            metricas.repasseTotalEntregadores += ganhoTotalEntregador;
            metricas.lucroTotalApp += lucroLiquidoApp;
            metricas.pedidosEntregues++;

            if (isFimDoTurno) {
                entregador.ocupado = false;
                entregador.marcador.setIcon(isBike ? iconeBikeLivre : iconeMotoLivre);
            }

            historicoDeDados.push({
                id_pedido: pedido.id,
                id_entregador: entregador.id,
                tipo_veiculo: entregador.tipo,
                distancia_km: distPercorridaKM.toFixed(2),
                receita_total_app_brl: receitaTotalApp.toFixed(2),
                ganho_entregador_brl: ganhoTotalEntregador.toFixed(2),
                lucro_liquido_app_brl: lucroLiquidoApp.toFixed(2),
                bonus_alta_demanda_pago: bonusSurgeEntregador.toFixed(2)
            });

            let tagTipo = isBike ? '<span class="tag-bike">BIKE</span>' : '<span class="tag-moto">MOTO</span>';
            registrarLog(`<span class="log-sucesso">✅ Pedido #${pedido.id} Entregue por ${tagTipo}.</span> (Lucro: R$ ${lucroLiquidoApp.toFixed(2).replace('.', ',')})`);
            atualizarDashboard();
        }

        function baixarCSV() {
            if (historicoDeDados.length === 0) return alert("Simule antes de exportar.");
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "ID Pedido;ID Entregador;Tipo Veiculo;Distancia (KM);Receita Total App (R$);Ganho Total Entregador (R$);Lucro Liquido App (R$);Bonus Pago Entregador (R$)\n";

            historicoDeDados.forEach(row => {
                let rowArray = [ row.id_pedido, row.id_entregador, row.tipo_veiculo, row.distancia_km.replace('.', ','), row.receita_total_app_brl.replace('.', ','), row.ganho_entregador_brl.replace('.', ','), row.lucro_liquido_app_brl.replace('.', ','), row.bonus_alta_demanda_pago.replace('.', ',') ];
                csvContent += rowArray.join(";") + "\n";
            });

            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", "keeta_dados_multimodal.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function gerarNovoPedido() {
            contadorPedidos++;
            const rest = restaurantes[contadorPedidos % 2 === 0 ? 1 : Math.floor(Math.random() * restaurantes.length)];
            
            // Variabilidade: Gera tanto rotas curtas (ideais pra bike) quanto longas (só pra motos)
            let variacaoRaio = Math.random() < 0.5 ? 0.03 : 0.08; 
            const latCliente = rest.lat + (Math.random() - 0.5) * variacaoRaio; 
            const lonCliente = rest.lon + (Math.random() - 0.5) * variacaoRaio;

            filaDePedidos.push({
                id: contadorPedidos,
                restaurante: rest,
                latCliente: latCliente,
                lonCliente: lonCliente,
                marcadorCliente: L.marker([latCliente, lonCliente], {icon: iconeCliente}).addTo(mapa)
            });
            rodarDispatch();
        }

        function atualizarDashboard() {
            if (metricas.pedidosEntregues > 0) {
                document.getElementById('kpi-entregas').innerText = metricas.pedidosEntregues;
                document.getElementById('kpi-ganho-entregador').innerText = `R$ ${(metricas.repasseTotalEntregadores / metricas.pedidosEntregues).toFixed(2).replace('.', ',')}`;
                document.getElementById('kpi-lucro-app').innerText = `R$ ${(metricas.lucroTotalApp / metricas.pedidosEntregues).toFixed(2).replace('.', ',')}`;
                
                let sla = Math.round(metricas.tempoTotalSLA / metricas.pedidosEntregues);
                document.getElementById('kpi-sla').innerText = `${sla} min`;
            }
        }

        setInterval(() => {
            dataVirtual.setMinutes(dataVirtual.getMinutes() + 1);
            document.getElementById('relogio-display').innerText = formatarHora(dataVirtual);
            rodarDispatch(); 
        }, 1000); 

    </script>
</body>
</html>
